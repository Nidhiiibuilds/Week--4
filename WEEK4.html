<!DOCTYPE html> 
<html> 
<head> 
    <title>College Admission Registration</title> 
</head> 
<body> 
    <center> 
        <h1>College Admission Registration</h1> 
        <form> 
            <table border="2" cellpadding="10" cellspacing="0" width="600"> 
                <tr> 
                    <td><label>Full Name:</label></td> 
                    <td><input type="text" name="fullname" size="30"></td> 
                </tr> 
                <tr> 
                    <td><label>Email:</label></td> 
                    <td><input type="email" name="email" size="30"></td> 
                </tr> 
                <tr> 
                    <td><label>Phone Number:</label></td> 
                    <td><input type="tel" name="phone" size="30"></td> 
                </tr> 
                <tr> 
                    <td><label>Gender:</label></td> 
                    <td> 
                    <input type="radio" name="gender"> Male 
                    <input type="radio" name="gender"> Female 
                    <input type="radio" name="gender"> Other 
                    </td> 
                </tr> 
                <tr> 
                    <td><label>Course Applying For:</label></td> 
                    <td> 
                    <select name="course"> 
                    <option>B.Tech</option> 
                    <option>B.Sc</option> 
                    <option>B.Com</option> 
                    <option>BBA</option> 
                    </select> 
                    </td> 
                </tr> 
                <tr> 
                    <td><label>Hobbies:</label></td> 
                    <td> 
                    <input type="checkbox" name="hobby1"> Sports 
                    <input type="checkbox" name="hobby2"> Music 
                    <input type="checkbox" name="hobby3"> Reading 
                    </td> 
                </tr> 
                <tr> 
                    <td><label>Date of Birth:</label></td> 
                    <td><input type="date" name="dob"></td> 
                </tr> 
                <tr> 
                    <td><label>Upload Certificates:</label></td> 
                    <td><input type="file" name="certificate"></td> 
                </tr> 
                <tr> 
                    <td><label>Address:</label></td> 
                    <td> 
                    <textarea name="address" rows="4" cols="30"></textarea> 
                    </td> 
                </tr> 
                <tr align="center"> 
                    <td colspan="2"> 
                    <input type="submit" value="Submit"> 
                    <input type="reset" value="Reset"> 
                    </td> 
                </tr> 
            </table> 
        </form> 
    </center> 
</body> 
</html>
